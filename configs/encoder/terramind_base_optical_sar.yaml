    - B1
    - B2
    - B3
    - B4
    - B5
    - B6
    - B7
    - B8
    - B8A
    - B9
    # - B10
    - B11
    - B12
  sar:
    - VV
    - VH

output_layers:
  - 2     
  - 5
  - 8    
  - 11    

output_dim: 768


