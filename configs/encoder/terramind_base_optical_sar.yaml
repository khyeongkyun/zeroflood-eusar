_target_: pangaea.encoders.terramind_encoder.terramind_v1_base
encoder_weights: /home/vmarsocci/pangaea-bench/pretrained_models/TerraMind_v1_base.pt
download_url: null    # https://huggingface.co/ibm-esa-geospatial/TerraMind-1.0-base

input_size: 224
patch_size: 16
merge_method: "mean"
modalities: ["S2L2A","S1RTC"]

input_bands:
