dataset:
  _target_: pangaea.datasets.zeroflood.ZeroFlood
  dataset_name: ZeroFlood
  root_path: /dss/dsstbyfs02/scratch/07/di54rur/zeroflood/ZeroFlood
  download_url: None
  auto_download: false
  img_size: 264
  multi_temporal: false
  multi_modal: false
