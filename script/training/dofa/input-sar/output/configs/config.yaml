      VV: 3.75
      VH: 3.75
      ASC_VV: 3.75
      ASC_VH: 3.75
      DSC_VV: 3.75
      DSC_VH: 3.75
      VV-VH: 3.75
  output_layers:
  - 3
  - 5
  - 7
  - 11
  output_dim: 768
decoder:
